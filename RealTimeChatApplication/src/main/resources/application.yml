spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:chatdb}
    username: ${POSTGRES_USER:chat_user}
    password: ${POSTGRES_PASSWORD:chat_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}

server:
  port: ${APP_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:replace-with-a-long-random-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    org.springframework.security: INFO
